<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>My Profile Card</title>
</head>

<body>
    <article data-testid="test-profile-card" class="profile-card">

        <!-- LEFT SIDE -->
        <figure>
            <img src="profile.jpeg" alt="Portrait of Abdulkareem Rukayat"
                data-testid="test-user-avatar" />

            <figcaption>Frontend Developer</figcaption>

            <h2 data-testid="test-user-name">Abdulkareem Rukayat</h2>

            <p data-testid="test-user-bio">
                I am a passionate frontend developer learning React, building projects, and sharing my journey.
            </p>
        </figure>

        <!-- RIGHT SIDE -->
        <div class="profile-content">

            <p data-testid="test-user-time" id="time" aria-live="polite"></p>

            <nav>
                <ul data-testid="test-user-social-links">
                    <li>
                        <a href="https://twitter.com/abdulkareemru19" target="_blank" rel="noopener noreferrer"
                            class="Twitter" data-testid="test-user-social-twitter">Twitter</a>
                    </li>
                    <li>
                        <a href="https://github.com/adebimpe01" target="_blank" rel="noopener noreferrer"
                           class="Github" data-testid="test-user-social-github">GitHub</a>
                    </li>
                    <li>
                        <a href="https://www.linkedin.com/in/abdulkareem-rukayat-b743a6247/" target="_blank"
                            rel="noopener noreferrer" class="linkedIn"
                            data-testid="test-user-social-linkedin">LinkedIn</a>
                    </li>
                </ul>
            </nav>

            <section>
                <h3>Hobbies</h3>
                <ul data-testid="test-user-hobbies">
                    <li>Coding</li>
                    <li>Watching Tech Videos</li>
                    <li>Content Creation</li>
                </ul>
            </section>

            <section>
                <h3>Dislikes</h3>
                <ul data-testid="test-user-dislikes">
                    <li>Procrastination</li>
                    <li>Slow Internet</li>
                </ul>
            </section>

        </div>

    </article>

    <script src="script.js"></script>
</body>

</html>
